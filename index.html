<!DOCTYPE html>
<html lang="en">
<head>

  <title>Arrays, ArrayList &amp; LinkedList — Data Structures</title>
<style>

*{margin:0;padding:0;box-sizing:border-box}

:root{--blue:#3b82f6;--green:#10b981;--orange:#f97316;--red:#ef4444;--purple:#8b5cf6;--amber:#f59e0b;--teal:#14b8a6;--pink:#ec4899;--dark:#0f172a;--dark2:#1e293b;--gray:#64748b;--light:#f8fafc}

body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f172a;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;margin:0;padding:0;overflow:hidden}

.deck{width:100vw;height:100vh;max-width:none}

.slide{display:none;background:#fff;border-radius:0;height:100vh;overflow:hidden;box-shadow:none;position:relative}

.slide.active{display:flex;flex-direction:column}

.slide.dark{background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f3460 100%);color:#e2e8f0}

.slide.dark2{background:linear-gradient(135deg,#064e3b 0%,#0f172a 100%);color:#e2e8f0}

.slide.dark3{background:linear-gradient(135deg,#4c1d95 0%,#0f172a 100%);color:#e2e8f0}

.pad{padding:44px 56px;flex:1;display:flex;flex-direction:column}

.badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 11px;border-radius:12px;color:#fff;letter-spacing:.5px}

.tag{font-size:9px;padding:2px 8px;border-radius:10px;font-weight:600;display:inline-block}

h2{font-size:22px;font-weight:700;color:#0f172a;margin:6px 0 4px;line-height:1.3}

.dark h2,.dark2 h2,.dark3 h2{color:#f1f5f9}

.sub{font-size:13px;color:#64748b;margin-bottom:14px}

.dark .sub{color:#94a3b8}

.mem{display:flex;gap:2px;margin:6px 0}

.mem-cell{flex:1;padding:10px 0;text-align:center;font-weight:700;font-size:15px;border-radius:5px;border:1.5px solid}

.mem-empty{flex:1;padding:10px 0;text-align:center;font-size:11px;color:#aaa;border:1.5px dashed #d1d5db;border-radius:5px;background:#f9fafb}

.node-chain{display:flex;align-items:center;gap:0;flex-wrap:wrap;margin:8px 0}

.nd{padding:6px 10px;border-radius:6px;text-align:center;min-width:48px;font-weight:700;font-size:14px;border:1.5px solid}

.nd-sub{font-size:8px;color:#9ca3af}

.arrow-r{font-size:14px;margin:0 2px}

.stat-grid{display:grid;gap:6px;margin:10px 0}

.stat{border-radius:8px;padding:7px 10px;text-align:center}

.stat-label{font-size:10px;color:#6b7280}

.stat-val{font-size:15px;font-weight:700}

.q-box{background:#f0fdf4;border-radius:10px;padding:12px 16px;border-left:3px solid #10b981;margin-bottom:10px}

.a-box{background:#f8fafc;border-radius:10px;padding:12px 16px;border:1px solid #e5e7eb;flex:1}

.dark .q-box{background:rgba(16,185,129,.1);border-left-color:#10b981}
.dark2 .q-box,.dark3 .q-box{background:rgba(16,185,129,.14);border-left-color:#34d399}

.dark .a-box,.dark2 .a-box,.dark3 .a-box{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.1)}

.q-title{font-size:18px;font-weight:700;color:#0f172a;line-height:1.4;margin-bottom:14px}

.dark .q-title,.dark2 .q-title,.dark3 .q-title{color:#f1f5f9}

.hint-label,.ans-label{font-size:10px;font-weight:700;letter-spacing:.5px;margin-bottom:4px}

.hint-label{color:#065f46}

.ans-label{color:#8b5cf6}

.dark .hint-label{color:#6ee7b7}

.dark .ans-label,.dark2 .ans-label,.dark3 .ans-label{color:#c4b5fd}

.text-sm{font-size:13px;line-height:1.6;color:#374151}

.dark .text-sm,.dark2 .text-sm,.dark3 .text-sm{color:#cbd5e1}

.controls{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding:0 4px}

.btn{padding:8px 22px;border-radius:8px;font-weight:600;font-size:12px;cursor:pointer;border:none;transition:all .15s}

.btn-prev{background:#1e293b;color:#94a3b8;border:1px solid #334155}

.btn-prev:hover{background:#334155;color:#e2e8f0}

.btn-prev:disabled{opacity:.3;cursor:default}

.btn-next{background:#3b82f6;color:#fff}

.btn-next:hover{background:#2563eb}

.btn-next:disabled{background:#475569;cursor:default}

.dots{display:flex;gap:3px;align-items:center;flex-wrap:wrap;justify-content:center;max-width:440px}

.dot{width:6px;height:6px;border-radius:3px;background:#475569;cursor:pointer;transition:all .2s}

.dot.on{width:18px;background:#3b82f6}

.counter{font-size:11px;color:#64748b;margin-left:6px}

.tbl{width:100%;border-collapse:collapse;font-size:10px;border-radius:10px;overflow:hidden}

.tbl th{background:#0f172a;color:#e2e8f0;padding:6px;font-weight:600;text-align:center}

.tbl td{padding:5px 6px;text-align:center;border-bottom:1px solid #f1f5f9}

.tbl tr:nth-child(even){background:#f8fafc}

.formula{font-family:'Courier New',monospace;background:#fff7ed;padding:6px 12px;border-radius:6px;font-size:12px;color:#92400e;display:inline-block;margin-top:6px}

.dark .formula{background:rgba(245,158,11,.12);color:#fbbf24}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}

.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}

.grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px}

.card-sm{border-radius:8px;padding:7px 10px}

.reveal-btn{background:none;border:1px dashed #8b5cf6;color:#8b5cf6;padding:6px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;margin-top:6px;transition:all .2s}

.reveal-btn:hover{background:#8b5cf622}

.hidden{display:none}

.codebox{background:#0f172a;color:#e2e8f0;border-radius:10px;padding:10px 12px;border:1px solid rgba(148,163,184,.25);font-family:'Courier New',monospace;font-size:12px;line-height:1.55;white-space:pre;overflow:auto}

.hint-btn{background:none;border:1px dashed #10b981;color:#10b981;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.hint-btn:hover{background:rgba(16,185,129,.12)}
.dark .hint-btn,.dark2 .hint-btn,.dark3 .hint-btn{border-color:#34d399;color:#34d399}

.level{position:absolute;top:14px;right:20px}

@media(max-width:600px){.pad{padding:18px 16px}h2{font-size:18px}.q-title{font-size:15px}.grid-2,.grid-3,.grid-4{grid-template-columns:1fr 1fr}}

.fw-row{display:flex;gap:10px;align-items:flex-start}
.fw-toggle{width:28px;height:28px;border-radius:10px;border:1px solid rgba(15,23,42,.18);background:rgba(255,255,255,.72);cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:900;line-height:1;transition:all .15s}
.fw-toggle:hover{background:#fff}
.fw-toggle.on{transform:rotate(180deg)}
.fw-ans{margin-top:4px;font-size:11px;color:#6b7280}

</style>
</head>

<script>

const S=[

// ===== SLIDE 0: TITLE =====

{dark:true,html:`

<div class="pad" style="align-items:center;justify-content:center;text-align:center">

  <div style="font-size:12px;letter-spacing:3px;color:#7ec8e3;margin-bottom:18px">DATA STRUCTURE&nbsp;&nbsp;ALGORITHM</div>

  <h2 style="font-size:36px;color:#f1f5f9;margin-bottom:8px">Arrays, ArrayList &<br>LinkedList Family</h2>

  <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:14px">

    <span style="padding:4px 14px;border-radius:16px;border:1px solid #3b82f6;font-size:11px;color:#3b82f6">Array</span>

    <span style="padding:4px 14px;border-radius:16px;border:1px solid #10b981;font-size:11px;color:#10b981">ArrayList</span>

    <span style="padding:4px 14px;border-radius:16px;border:1px solid #f97316;font-size:11px;color:#f97316">Singly LL</span>

    <span style="padding:4px 14px;border-radius:16px;border:1px solid #ef4444;font-size:11px;color:#ef4444">Doubly LL</span>

    <span style="padding:4px 14px;border-radius:16px;border:1px solid #8b5cf6;font-size:11px;color:#8b5cf6">Circular LL</span>

  </div>

</div>`},



// ===== SLIDE 1: ARRAY CONCEPT =====

{html:`

<div class="pad">

  <span class="badge" style="background:#3b82f6">ARRAY</span>

  <h2>Contiguous Memory, Fixed Size</h2>

  <p class="sub">Elements stored side-by-side in consecutive memory locations</p>

  <div class="codebox" style="margin-bottom:12px">int arr[5] = {10,20,30,40,50};</div>

  <div style="background:#f8fafc;border-radius:10px;padding:14px;border:1px solid #e5e7eb;margin-bottom:12px">

    <div style="font-size:10px;color:#9ca3af;margin-bottom:6px">MEMORY LAYOUT — int arr[5] = {10,20,30,40,50}</div>

    <div style="display:flex;font-size:9px;color:#9ca3af;margin-bottom:2px"><span style="flex:1;text-align:center">0x100</span><span style="flex:1;text-align:center">0x104</span><span style="flex:1;text-align:center">0x108</span><span style="flex:1;text-align:center">0x10C</span><span style="flex:1;text-align:center">0x110</span></div>

    <div class="mem">

      <div class="mem-cell" style="background:#dbeafe;color:#1e40af;border-color:#3b82f6">10</div>

      <div class="mem-cell" style="background:#dbeafe;color:#1e40af;border-color:#3b82f6">20</div>

      <div class="mem-cell" style="background:#dbeafe;color:#1e40af;border-color:#3b82f6">30</div>

      <div class="mem-cell" style="background:#3b82f6;color:#fff;border-color:#3b82f6">40</div>

      <div class="mem-cell" style="background:#dbeafe;color:#1e40af;border-color:#3b82f6">50</div>

    </div>

    <div style="display:flex;font-size:10px;color:#6b7280;margin-top:2px"><span style="flex:1;text-align:center">[0]</span><span style="flex:1;text-align:center">[1]</span><span style="flex:1;text-align:center">[2]</span><span style="flex:1;text-align:center">[3] ⬆ O(1)</span><span style="flex:1;text-align:center">[4]</span></div>

  </div>

  <div class="grid-3">

    <div class="stat" style="background:#10b98115"><div class="stat-label">Access</div><div class="stat-val" style="color:#10b981">O(1)</div></div>

    <div class="stat" style="background:#ef444415"><div class="stat-label">Insert mid</div><div class="stat-val" style="color:#ef4444">O(n)</div></div>

    <div class="stat" style="background:#f59e0b15"><div class="stat-label">Search</div><div class="stat-val" style="color:#f59e0b">O(n)</div></div>

  </div>

  <div class="formula">addr(arr[i]) = base + i × sizeof(type)</div>

  <div style="margin-top:10px;font-size:12px;color:#6b7280;line-height:1.6">

    <b>Key traits:</b> Fixed size • Contiguous memory • Homogeneous types • Best cache performance • No resize capability

  </div>

</div>`},



// ===== SLIDE 2: ARRAY OPERATIONS =====

{html:`

<div class="pad">

  <span class="badge" style="background:#3b82f6">ARRAY</span>

  <h2>Operations & Shifting Cost</h2>

  <p class="sub">Why inserting and deleting in arrays is expensive</p>

  <table class="tbl" style="font-size:11px;margin-bottom:12px">

    <tr><th>Operation</th><th>Time</th><th>Why</th></tr>

    <tr><td style="font-weight:600">Access arr[i]</td><td><span style="color:#10b981;font-weight:700">O(1)</span></td><td>Direct address formula</td></tr>

    <tr><td style="font-weight:600">Search (unsorted)</td><td><span style="color:#f59e0b;font-weight:700">O(n)</span></td><td>Linear scan</td></tr>

    <tr><td style="font-weight:600">Binary search (sorted)</td><td><span style="color:#3b82f6;font-weight:700">O(log n)</span></td><td>Halve range each step</td></tr>

    <tr><td style="font-weight:600">Insert at end</td><td><span style="color:#10b981;font-weight:700">O(1)</span></td><td>If space available</td></tr>

    <tr><td style="font-weight:600">Insert at middle</td><td><span style="color:#ef4444;font-weight:700">O(n)</span></td><td>Shift right</td></tr>

    <tr><td style="font-weight:600">Delete at middle</td><td><span style="color:#ef4444;font-weight:700">O(n)</span></td><td>Shift left</td></tr>

  </table>

  <div style="background:#fef2f2;border-radius:8px;padding:10px 14px;border-left:3px solid #ef4444">

    <div style="font-size:11px;font-weight:700;color:#991b1b;margin-bottom:4px">INSERT AT INDEX 2 — shifting visualized</div>

    <div style="display:flex;gap:3px;align-items:center;font-size:12px">

      <span style="padding:5px 10px;background:#dbeafe;border-radius:4px;font-weight:700;color:#1e40af">10</span>

      <span style="padding:5px 10px;background:#dbeafe;border-radius:4px;font-weight:700;color:#1e40af">20</span>

      <span style="padding:5px 8px;background:#10b981;border-radius:4px;font-weight:700;color:#fff;font-size:10px">NEW</span>

      <span style="color:#ef4444">→</span>

      <span style="padding:5px 10px;background:#fecaca;border-radius:4px;font-weight:700;color:#991b1b">30</span>

      <span style="color:#ef4444">→</span>

      <span style="padding:5px 10px;background:#fecaca;border-radius:4px;font-weight:700;color:#991b1b">40</span>

      <span style="color:#ef4444">→</span>

      <span style="padding:5px 10px;background:#fecaca;border-radius:4px;font-weight:700;color:#991b1b">50</span>

    </div>

    <div style="font-size:10px;color:#991b1b;margin-top:4px">All elements from index 2 onward must shift right — O(n) work</div>

  </div>

</div>`},



// ===== SLIDE 3: ARRAYLIST CONCEPT =====

{html:`

<div class="pad">

  <span class="badge" style="background:#10b981">ARRAYLIST ADT</span>

  <h2>Dynamic Array — Auto-Resizing</h2>

  <p class="sub">Internally backed by an array, grows when capacity is exceeded</p>

  <div class="grid-2" style="margin-bottom:12px">
    <div class="codebox">ArrayList&lt;Integer&gt; list = new ArrayList&lt;&gt;();</div>
    <div class="codebox">public class ArrayList&lt;E&gt; extends AbstractList&lt;E&gt;
        implements List&lt;E&gt;, RandomAccess, Cloneable, java.io.Serializable
{ ... }</div>
  </div>

  <div style="font-size:11px;color:#ef4444;font-weight:600;margin-bottom:4px">Before add(50) — size:4, capacity:4 — FULL</div>

  <div class="mem">

    <div class="mem-cell" style="background:#d1fae5;color:#065f46;border-color:#10b981">10</div>

    <div class="mem-cell" style="background:#d1fae5;color:#065f46;border-color:#10b981">20</div>

    <div class="mem-cell" style="background:#d1fae5;color:#065f46;border-color:#10b981">30</div>

    <div class="mem-cell" style="background:#d1fae5;color:#065f46;border-color:#10b981">40</div>

  </div>

  <div style="text-align:center;font-size:16px;color:#10b981;margin:4px 0">▼ <span style="font-size:11px;font-weight:600">resize 2× → allocate new array → copy elements</span></div>

  <div style="font-size:11px;color:#10b981;font-weight:600;margin-bottom:4px">After add(50) — size:5, capacity:8</div>

  <div class="mem">

    <div class="mem-cell" style="background:#d1fae5;color:#065f46;border-color:#14b8a6;font-size:13px">10</div>

    <div class="mem-cell" style="background:#d1fae5;color:#065f46;border-color:#14b8a6;font-size:13px">20</div>

    <div class="mem-cell" style="background:#d1fae5;color:#065f46;border-color:#14b8a6;font-size:13px">30</div>

    <div class="mem-cell" style="background:#d1fae5;color:#065f46;border-color:#14b8a6;font-size:13px">40</div>

    <div class="mem-cell" style="background:#d1fae5;color:#065f46;border-color:#14b8a6;font-size:13px">50</div>

    <div class="mem-empty">—</div><div class="mem-empty">—</div><div class="mem-empty">—</div>

  </div>

  <div class="grid-3" style="margin-top:10px">

    <div class="stat" style="background:#10b98112"><div class="stat-label">Add (end)</div><div class="stat-val" style="color:#10b981">O(1)*</div></div>

    <div class="stat" style="background:#f59e0b12"><div class="stat-label">Add (mid)</div><div class="stat-val" style="color:#f59e0b">O(n)</div></div>

    <div class="stat" style="background:#ef444412"><div class="stat-label">Resize cost</div><div class="stat-val" style="color:#ef4444">O(n)</div></div>

  </div>

  <div style="font-size:11px;color:#6b7280;margin-top:8px">*Amortized O(1). Java uses 1.5× growth, Python ~1.125×, C++ vector 2×. Objects only — primitives auto-boxed.</div>

</div>`},



// ===== SLIDE 4: ARRAYLIST AMORTIZED =====

{html:`

<div class="pad">

  <span class="badge" style="background:#10b981">ARRAYLIST</span>

  <h2>Amortized Analysis & Growth Strategy</h2>

  <p class="sub">Why "O(n) worst case" doesn't tell the full story</p>

  <div style="background:#f8fafc;border-radius:10px;padding:14px;border:1px solid #e5e7eb;margin-bottom:12px">

    <div style="font-size:10px;color:#9ca3af;letter-spacing:1px;margin-bottom:8px">CAPACITY JUMPS (2× GROWTH)</div>

    <div style="display:flex;align-items:flex-end;gap:6px;height:100px">

      ${[{c:1,h:8},{c:2,h:16},{c:4,h:28},{c:8,h:44},{c:16,h:60},{c:32,h:78},{c:64,h:100}].map(b=>`<div style="flex:1;text-align:center"><span style="font-size:10px;font-weight:700;color:#10b981">${b.c}</span><div style="height:${b.h}px;background:linear-gradient(180deg,#10b981,#065f46);border-radius:4px 4px 0 0;margin-top:4px"></div></div>`).join('')}

    </div>

    <div style="border-top:1px solid #e5e7eb;margin-top:4px;padding-top:6px;font-size:10px;color:#6b7280;text-align:center">Each resize doubles capacity — copies get exponentially rarer</div>

  </div>

  <div class="grid-2">

    <div style="background:#ecfdf5;border-radius:10px;padding:12px"><div style="font-size:20px;font-weight:700;color:#065f46">O(1)</div><div style="font-size:11px;color:#047857;font-weight:500">Amortized per insert</div><div style="font-size:10px;color:#6b7280;margin-top:4px">Geometric series: total copies ≤ 2n</div></div>

    <div style="background:#fef2f2;border-radius:10px;padding:12px"><div style="font-size:20px;font-weight:700;color:#991b1b">O(n)</div><div style="font-size:11px;color:#b91c1c;font-weight:500">Worst single insert</div><div style="font-size:10px;color:#6b7280;margin-top:4px">Only when resize triggers — copy all</div></div>

  </div>

  <div style="margin-top:10px;background:#f5f3ff;border-radius:8px;padding:10px 14px;border-left:3px solid #8b5cf6">

    <div style="font-size:11px;font-weight:700;color:#5b21b6">1.5× vs 2×</div>

    <div style="font-size:12px;color:#374151;margin-top:2px">2× = fewer resizes, 50% waste max. 1.5× = more resizes, 33% waste max. Memory-sensitive → 1.5× (Java). Speed-sensitive → 2× (C++).</div>

  </div>

</div>`},



// ===== SLIDE 5: SINGLY LL CONCEPT =====

{html:`

<div class="pad">

  <span class="badge" style="background:#f97316">SINGLY LINKED LIST</span>

  <h2>The One-Way Chain</h2>

  <p class="sub">Non-contiguous nodes connected by next pointers</p>

  <div style="background:#f8fafc;border-radius:10px;padding:14px;border:1px solid #e5e7eb;margin-bottom:12px">

    <div style="font-size:10px;color:#9ca3af;margin-bottom:6px">HEAD →</div>

    <div class="node-chain">

      ${[10,20,30,40,50].map((v,i)=>`<div class="nd" style="background:#fff7ed;color:#c2410c;border-color:#f97316"><div style="font-size:14px;font-weight:700">${v}</div><div class="nd-sub">next→</div></div>${i<4?'<span class="arrow-r" style="color:#f97316">→</span>':''}`).join('')}

      <span style="font-size:11px;color:#ef4444;margin-left:6px;font-weight:600">NULL</span>

    </div>

  </div>

  <div class="grid-4">

    <div class="stat" style="background:#10b98112"><div class="stat-label">Insert head</div><div class="stat-val" style="color:#10b981">O(1)</div></div>

    <div class="stat" style="background:#f59e0b12"><div class="stat-label">Insert tail</div><div class="stat-val" style="color:#f59e0b">O(n)*</div></div>

    <div class="stat" style="background:#10b98112"><div class="stat-label">Delete head</div><div class="stat-val" style="color:#10b981">O(1)</div></div>

    <div class="stat" style="background:#ef444412"><div class="stat-label">Access [i]</div><div class="stat-val" style="color:#ef4444">O(n)</div></div>

  </div>

  <div style="font-size:10px;color:#9ca3af;margin-top:4px">*O(1) if tail pointer maintained</div>

  <div style="font-size:12px;color:#6b7280;margin-top:10px;line-height:1.6">

    <b>Key traits:</b> Dynamic size • Non-contiguous memory • Forward-only traversal • No random access • Each node = Data + pointer (8 bytes extra on 64-bit)

  </div>

  <div style="margin-top:8px;background:#fff7ed;border-radius:8px;padding:8px 12px;border-left:3px solid #f97316">

    <div style="font-size:11px;color:#9a3412"><b>Insert at head:</b> newNode.next = HEAD → HEAD = newNode → Done in O(1)</div>

  </div>

</div>`},



// ===== SLIDE 6: SINGLY LL OPS =====

{html:`

<div class="pad">

  <span class="badge" style="background:#f97316">SINGLY LL</span>

  <h2>Operations — Step by Step</h2>

  <p class="sub">How insertion and deletion actually work at the pointer level</p>

  <div class="grid-2" style="margin-bottom:12px">

    <div style="background:#ecfdf5;border-radius:10px;padding:12px;border-left:3px solid #10b981">

      <div style="font-size:12px;font-weight:700;color:#065f46;margin-bottom:6px">Insert at Head — O(1)</div>

      <div style="font-size:11px;color:#374151;line-height:1.5">1. Create newNode<br>2. newNode.next = HEAD<br>3. HEAD = newNode<br><span style="color:#10b981;font-weight:600">3 pointer operations. Done.</span></div>

    </div>

    <div style="background:#fef2f2;border-radius:10px;padding:12px;border-left:3px solid #ef4444">

      <div style="font-size:12px;font-weight:700;color:#991b1b;margin-bottom:6px">Insert at Tail — O(n)</div>

      <div style="font-size:11px;color:#374151;line-height:1.5">1. Traverse: curr = HEAD<br>2. while(curr.next != null) → advance<br>3. curr.next = newNode<br><span style="color:#ef4444;font-weight:600">Must walk entire list first.</span></div>

    </div>

  </div>

  <div class="grid-2">

    <div style="background:#dbeafe;border-radius:10px;padding:12px;border-left:3px solid #3b82f6">

      <div style="font-size:12px;font-weight:700;color:#1e40af;margin-bottom:6px">Delete Head — O(1)</div>

      <div style="font-size:11px;color:#374151;line-height:1.5">1. temp = HEAD<br>2. HEAD = HEAD.next<br>3. free(temp)<br><span style="color:#3b82f6;font-weight:600">Just move HEAD forward.</span></div>

    </div>

    <div style="background:#f5f3ff;border-radius:10px;padding:12px;border-left:3px solid #8b5cf6">

      <div style="font-size:12px;font-weight:700;color:#5b21b6;margin-bottom:6px">Delete Middle Node — O(n)</div>

      <div style="font-size:11px;color:#374151;line-height:1.5">1. Find prev node (traverse)<br>2. prev.next = target.next<br>3. free(target)<br><span style="color:#8b5cf6;font-weight:600">Finding prev costs O(n).</span></div>

    </div>

  </div>

  <div style="margin-top:12px;background:#f8fafc;border-radius:8px;padding:10px 14px;border:1px solid #e5e7eb">

    <div style="font-size:11px;font-weight:700;color:#374151;margin-bottom:4px">Common mistake: Losing references</div>

    <div style="font-size:11px;color:#6b7280">Always update pointers in the right order. If you set HEAD = HEAD.next before saving the old HEAD, the old node is lost (memory leak in C, garbage in Java).</div>

  </div>

</div>`},



// ===== SLIDE 7: DOUBLY LL CONCEPT =====

{html:`

<div class="pad">

  <span class="badge" style="background:#ef4444">DOUBLY LINKED LIST</span>

  <h2>Two-Way Navigation</h2>

  <p class="sub">Each node has both prev and next pointers — traverse in either direction</p>

  <div style="background:#f8fafc;border-radius:10px;padding:14px;border:1px solid #e5e7eb;margin-bottom:12px">

    <div style="font-size:10px;color:#9ca3af;margin-bottom:6px">HEAD ↔ ↔ ↔ TAIL</div>

    <div class="node-chain">

      ${[10,20,30,40].map((v,i)=>`<div class="nd" style="background:#fef2f2;color:#b91c1c;border-color:#ef4444"><div class="nd-sub">←prev</div><div style="font-size:14px;font-weight:700">${v}</div><div class="nd-sub">next→</div></div>${i<3?'<span class="arrow-r" style="color:#ef4444">⇄</span>':''}`).join('')}

    </div>

    <div style="font-size:10px;color:#9ca3af;margin-top:4px">NULL ← first node ... last node → NULL</div>

  </div>

  <div class="grid-4">

    <div class="stat" style="background:#10b98112"><div class="stat-label">Insert head</div><div class="stat-val" style="color:#10b981">O(1)</div></div>

    <div class="stat" style="background:#10b98112"><div class="stat-label">Insert tail</div><div class="stat-val" style="color:#10b981">O(1)</div></div>

    <div class="stat" style="background:#10b98112"><div class="stat-label">Delete known</div><div class="stat-val" style="color:#10b981">O(1)</div></div>

    <div class="stat" style="background:#ef444412"><div class="stat-label">Access [i]</div><div class="stat-val" style="color:#ef4444">O(n)</div></div>

  </div>

  <div style="margin-top:10px;background:#fef2f2;border-radius:8px;padding:10px 14px;border-left:3px solid #ef4444">

    <div style="font-size:12px;font-weight:700;color:#991b1b;margin-bottom:4px">Why O(1) delete of a known node?</div>

    <div style="font-size:11px;color:#374151;font-family:monospace;line-height:1.8">

      node.prev.next = node.next;<br>node.next.prev = node.prev;<br><span style="color:#ef4444">// Both neighbors accessible — no traversal needed!</span>

    </div>

  </div>

  <div style="font-size:11px;color:#6b7280;margin-top:8px"><b>Trade-off:</b> Extra 8 bytes per node (prev pointer). Worth it when deletion of arbitrary nodes is frequent.</div>

</div>`},



// ===== SLIDE 8: CIRCULAR LL CONCEPT =====

{html:`

<div class="pad">

  <span class="badge" style="background:#8b5cf6">CIRCULAR LINKED LIST</span>

  <h2>The Infinite Loop</h2>

  <p class="sub">Last node points back to first — no NULL termination</p>

  <div style="background:#f8fafc;border-radius:10px;padding:14px;border:1px solid #e5e7eb;margin-bottom:10px">

    <div style="font-size:10px;color:#9ca3af;margin-bottom:6px">CIRCULAR SINGLY LL</div>

    <div class="node-chain">

      ${["P1","P2","P3","P4"].map((v,i)=>`<div class="nd" style="background:#f5f3ff;color:#6d28d9;border-color:#8b5cf6"><div style="font-size:13px;font-weight:700">${v}</div><div class="nd-sub">next→</div></div>${i<3?'<span class="arrow-r" style="color:#8b5cf6">→</span>':''}`).join('')}

      <span style="font-size:11px;color:#8b5cf6;margin-left:6px;font-weight:700">↻ HEAD</span>

    </div>

    <div style="font-size:10px;color:#8b5cf6;margin-top:6px;font-weight:600">Traversal ends when current === startNode (never check for NULL!)</div>

  </div>

  <div style="font-size:12px;font-weight:700;color:#374151;margin-bottom:6px">Real-world applications:</div>

  <div class="grid-2">

    <div class="card-sm" style="background:#8b5cf608;border-left:2px solid #8b5cf6"><div style="font-size:12px;font-weight:600;color:#0f172a">Round-robin CPU scheduling</div><div style="font-size:10px;color:#6b7280">OS cycles through processes</div></div>

    <div class="card-sm" style="background:#8b5cf608;border-left:2px solid #8b5cf6"><div style="font-size:12px;font-weight:600;color:#0f172a">Music playlist (repeat)</div><div style="font-size:10px;color:#6b7280">Last song → first song</div></div>

    <div class="card-sm" style="background:#8b5cf608;border-left:2px solid #8b5cf6"><div style="font-size:12px;font-weight:600;color:#0f172a">Multiplayer game turns</div><div style="font-size:10px;color:#6b7280">Player N → Player 1</div></div>

    <div class="card-sm" style="background:#8b5cf608;border-left:2px solid #8b5cf6"><div style="font-size:12px;font-weight:600;color:#0f172a">Ring buffer / circular queue</div><div style="font-size:10px;color:#6b7280">Fixed-size, overwrite oldest</div></div>

  </div>

  <div style="margin-top:8px;font-size:11px;color:#6b7280">Can be singly circular or doubly circular. Doubly gives O(1) delete.</div>

</div>`},

// Q1

{dark:true,html:`

<div class="pad">

  <div style="display:flex;justify-content:space-between;align-items:center">${'<span class="badge" style="background:#3b82f6">ARRAY</span>'}<span class="tag" style="background:#f59e0b22;color:#f59e0b">HARD</span></div>

  <div class="q-title" style="margin-top:8px">Q1: You insert n elements one by one at index 0 of an array. What is the total time complexity?</div>

  <div class="q-box"><div class="hint-label">HINT</div><div class="text-sm">Each insertion at index 0 shifts ALL existing elements right by 1 position.</div></div>

  <div class="a-box"><div class="ans-label">ANSWER <button class="reveal-btn" onclick="this.parentElement.nextElementSibling.classList.toggle('hidden');this.textContent=this.textContent==='Reveal'?'Hide':'Reveal'">Reveal</button></div><div class="hidden"><div class="text-sm" style="margin-top:6px">1st insert: 0 shifts. 2nd: 1 shift. 3rd: 2 shifts... nth: (n-1) shifts.<br><br>Total = 0+1+2+...+(n-1) = <b>n(n-1)/2 = O(n²)</b>.<br><br>This is why ArrayList.add(0, val) in a loop is an anti-pattern — use LinkedList or ArrayDeque instead.</div></div></div>

</div>`},



// Q2

{dark:true,html:`

<div class="pad">

  <div style="display:flex;justify-content:space-between;align-items:center">${'<span class="badge" style="background:#3b82f6">ARRAY</span>'}<span class="tag" style="background:#ef444422;color:#ef4444">SENIOR</span></div>

  <div class="q-title" style="margin-top:8px">Q2: Two O(n) algorithms — one uses Array, one uses LinkedList. The Array version runs 50× faster. Why?</div>

  <div class="q-box"><div class="hint-label">HINT</div><div class="text-sm">Think about CPU hardware, not Big-O notation.</div></div>

  <div class="a-box"><div class="ans-label">ANSWER <button class="reveal-btn" onclick="this.parentElement.nextElementSibling.classList.toggle('hidden');this.textContent=this.textContent==='Reveal'?'Hide':'Reveal'">Reveal</button></div><div class="hidden"><div class="text-sm" style="margin-top:6px"><b>CPU cache lines</b> (64 bytes). Array elements sit contiguously → CPU prefetcher loads the next cache line automatically → ~99% cache hits.<br><br>LinkedList nodes are scattered across the heap → every node access is a potential cache miss (~100 cycle penalty each).<br><br>For 1M elements: Array gets streaming prefetch. LL gets pointer-chasing. Same O(n), vastly different wall-clock time. This is called <b>spatial locality</b>.</div></div></div>

</div>`},



// Q3

{dark:true,html:`

<div class="pad">

  <div style="display:flex;justify-content:space-between;align-items:center">${'<span class="badge" style="background:#10b981">ARRAYLIST</span>'}<span class="tag" style="background:#f59e0b22;color:#f59e0b">HARD</span></div>

  <div class="q-title" style="margin-top:8px">Q3: After inserting 1000 elements from capacity 1 (2× growth), how many total element copies occurred?</div>

  <div class="q-box"><div class="hint-label">HINT</div><div class="text-sm">Copies happen at each resize: capacity 1, 2, 4, 8... Sum the geometric series.</div></div>

  <div class="a-box"><div class="ans-label">ANSWER <button class="reveal-btn" onclick="this.parentElement.nextElementSibling.classList.toggle('hidden');this.textContent=this.textContent==='Reveal'?'Hide':'Reveal'">Reveal</button></div><div class="hidden"><div class="text-sm" style="margin-top:6px">Resizes at: 1+2+4+8+16+32+64+128+256+512 = <b>1023 copies</b>.<br><br>For 1000 inserts → ~1 copy/insert average → <b>O(1) amortized</b>.<br>Proof: geometric series sum = 2^(k+1) - 1 where 2^k ≤ n. Always < 2n.<br>Total work for n inserts = O(n) → per-insert = O(1) amortized.</div></div></div>

</div>`},



// Q4

{dark:true,html:`

<div class="pad">

  <div style="display:flex;justify-content:space-between;align-items:center">${'<span class="badge" style="background:#10b981">ARRAYLIST</span>'}<span class="tag" style="background:#ef444422;color:#ef4444">SENIOR</span></div>

  <div class="q-title" style="margin-top:8px">Q4: ArrayList&lt;Integer&gt; uses 5× more memory than int[]. Explain exactly why.</div>

  <div class="q-box"><div class="hint-label">HINT</div><div class="text-sm">Consider: object header, autoboxing, pointer size, padding.</div></div>

  <div class="a-box"><div class="ans-label">ANSWER <button class="reveal-btn" onclick="this.parentElement.nextElementSibling.classList.toggle('hidden');this.textContent=this.textContent==='Reveal'?'Hide':'Reveal'">Reveal</button></div><div class="hidden"><div class="text-sm" style="margin-top:6px"><b>int[]:</b> 4 bytes per element. Simple.<br><br><b>ArrayList&lt;Integer&gt;:</b> each element is an Integer object:<br>• 12B object header + 4B int value + 4B padding = 16B per Integer<br>• Plus 8B reference (pointer) in the backing Object[] array<br>• = ~24 bytes per element vs 4 bytes = <b>6× overhead</b><br><br>Plus unused capacity slots waste additional memory. This is why numeric-heavy code (ML, trading) uses primitive arrays or libraries like Eclipse Collections.</div></div></div>

</div>`},



// Q5

{dark:true,html:`

<div class="pad">

  <div style="display:flex;justify-content:space-between;align-items:center">${'<span class="badge" style="background:#f97316">SINGLY LL</span>'}<span class="tag" style="background:#f59e0b22;color:#f59e0b">HARD</span></div>

  <div class="q-title" style="margin-top:8px">Q5: Reverse a Singly Linked List in-place with O(1) extra space. Walk through the algorithm.</div>

  <div class="q-box"><div class="hint-label">HINT</div><div class="text-sm">Use three pointers: prev, current, next. Re-point each arrow backward.</div></div>

  <div class="a-box"><div class="ans-label">ANSWER <button class="reveal-btn" onclick="this.parentElement.nextElementSibling.classList.toggle('hidden');this.textContent=this.textContent==='Reveal'?'Hide':'Reveal'">Reveal</button></div><div class="hidden"><div class="text-sm" style="margin-top:6px"><code>prev = null, curr = head<br>while (curr != null):<br>&nbsp;&nbsp;next = curr.next &nbsp;// save next<br>&nbsp;&nbsp;curr.next = prev &nbsp;// reverse pointer<br>&nbsp;&nbsp;prev = curr &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;// advance prev<br>&nbsp;&nbsp;curr = next &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;// advance curr<br>head = prev</code><br><br><b>Time: O(n), Space: O(1)</b>. Each node visited exactly once. The key insight: you must save curr.next BEFORE overwriting it. This is LeetCode #206.</div></div></div>

</div>`},



// Q6

{dark:true,html:`

<div class="pad">

  <div style="display:flex;justify-content:space-between;align-items:center">${'<span class="badge" style="background:#f97316">SINGLY LL</span>'}<span class="tag" style="background:#ef444422;color:#ef4444">SENIOR</span></div>

  <div class="q-title" style="margin-top:8px">Q6: Detect a cycle in a linked list. Find the cycle's starting node. Prove why it works.</div>

  <div class="q-box"><div class="hint-label">HINT</div><div class="text-sm">Floyd's Tortoise and Hare — two pointers at different speeds.</div></div>

  <div class="a-box"><div class="ans-label">ANSWER <button class="reveal-btn" onclick="this.parentElement.nextElementSibling.classList.toggle('hidden');this.textContent=this.textContent==='Reveal'?'Hide':'Reveal'">Reveal</button></div><div class="hidden"><div class="text-sm" style="margin-top:6px"><b>Detection:</b> slow moves 1 step, fast moves 2 steps. If cycle exists, they meet inside the cycle (fast laps slow). If fast hits NULL → no cycle. O(n) time, O(1) space.<br><br><b>Find start:</b> After meeting, reset one pointer to head. Move both at speed 1. They meet at cycle start.<br><br><b>Proof:</b> Let d = distance head→cycle-start, k = meeting point from cycle start, C = cycle length. When they meet: slow traveled d+k, fast traveled d+k+mC. Since fast = 2×slow: d+k+mC = 2(d+k) → d = mC−k. So moving d steps from meeting point lands at cycle start.<br><br><div style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:10px 12px;margin-top:10px"><div style="font-size:11px;font-weight:700;letter-spacing:.5px;color:#cbd5e1;margin-bottom:6px">VISUAL (animated)</div><svg viewBox="0 0 420 120" width="100%" height="120" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#22c55e"/><stop offset="1" stop-color="#3b82f6"/></linearGradient></defs><path d="M30 60 C 90 10, 150 10, 210 60 C 270 110, 330 110, 390 60" fill="none" stroke="rgba(148,163,184,.35)" stroke-width="3" stroke-linecap="round"/><circle r="7" fill="#22c55e"><animateMotion dur="2.8s" repeatCount="indefinite" path="M30 60 C 90 10, 150 10, 210 60 C 270 110, 330 110, 390 60"/></circle><circle r="7" fill="#3b82f6"><animateMotion dur="1.4s" repeatCount="indefinite" path="M30 60 C 90 10, 150 10, 210 60 C 270 110, 330 110, 390 60"/></circle><text x="18" y="108" fill="#94a3b8" font-size="10" font-family="system-ui, sans-serif">slow</text><text x="46" y="108" fill="#93c5fd" font-size="10" font-family="system-ui, sans-serif">fast (2×)</text><path d="M300 40 q 30 -24 60 0 q 30 24 0 48 q -30 24 -60 0 q -30 -24 0 -48" fill="none" stroke="url(#g)" stroke-width="3" opacity=".9"/></svg></div></div></div></div>

</div>`},



// Q7

{dark:true,html:`

<div class="pad">

  <div style="display:flex;justify-content:space-between;align-items:center">${'<span class="badge" style="background:#f97316">SINGLY LL</span>'}<span class="tag" style="background:#ef444422;color:#ef4444">SENIOR</span></div>

  <div class="q-title" style="margin-top:8px">Q7: Find the middle node of a linked list in ONE pass without counting nodes first.</div>

  <div class="q-box"><div class="hint-label">HINT</div><div class="text-sm">If one pointer runs twice as fast as the other...</div></div>

  <div class="a-box"><div class="ans-label">ANSWER <button class="reveal-btn" onclick="this.parentElement.nextElementSibling.classList.toggle('hidden');this.textContent=this.textContent==='Reveal'?'Hide':'Reveal'">Reveal</button></div><div class="hidden"><div class="text-sm" style="margin-top:6px"><b>Slow-fast pointer technique:</b><br><code>slow = head, fast = head<br>while (fast != null && fast.next != null):<br>&nbsp;&nbsp;slow = slow.next<br>&nbsp;&nbsp;fast = fast.next.next<br>return slow // this is the middle</code><br><br>When fast reaches the end, slow is at the midpoint (fast traveled 2× the distance). <b>O(n) time, O(1) space</b>.<br><br><div style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:10px 12px;margin-top:10px"><div style="font-size:11px;font-weight:700;letter-spacing:.5px;color:#cbd5e1;margin-bottom:6px">VISUAL (animated)</div><svg viewBox="0 0 520 80" width="100%" height="80" xmlns="http://www.w3.org/2000/svg"><g fill="none" stroke="rgba(148,163,184,.35)" stroke-width="2"><path d="M30 40 H490"/></g><g font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8"><text x="24" y="68">head</text><text x="462" y="68">tail</text></g><g><circle cx="60" cy="40" r="11" fill="#0f172a" stroke="#f97316" stroke-width="2"/><circle cx="140" cy="40" r="11" fill="#0f172a" stroke="#f97316" stroke-width="2"/><circle cx="220" cy="40" r="11" fill="#0f172a" stroke="#f97316" stroke-width="2"/><circle cx="300" cy="40" r="11" fill="#0f172a" stroke="#f97316" stroke-width="2"/><circle cx="380" cy="40" r="11" fill="#0f172a" stroke="#f97316" stroke-width="2"/><circle cx="460" cy="40" r="11" fill="#0f172a" stroke="#f97316" stroke-width="2"/></g><circle r="7" fill="#22c55e"><animate attributeName="cx" dur="2.4s" repeatCount="indefinite" values="60;140;220;300;380;460"/><animate attributeName="cy" dur="2.4s" repeatCount="indefinite" values="40;40;40;40;40;40"/></circle><circle r="7" fill="#3b82f6" opacity=".95"><animate attributeName="cx" dur="2.4s" repeatCount="indefinite" values="60;220;380;60;220;380"/><animate attributeName="cy" dur="2.4s" repeatCount="indefinite" values="40;40;40;40;40;40"/></circle><g font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8"><text x="18" y="16" fill="#86efac">slow</text><text x="64" y="16" fill="#93c5fd">fast (2×)</text></g></svg></div></div></div></div>

// Q8

{dark:true,html:`

<div class="pad">

  <div style="display:flex;justify-content:space-between;align-items:center">${'<span class="badge" style="background:#ef4444">DOUBLY LL</span>'}<span class="tag" style="background:#ef444422;color:#ef4444">SENIOR</span></div>

  <div class="q-title" style="margin-top:8px">Q8: Design an LRU Cache with O(1) get and O(1) put. Why is DLL + HashMap optimal?</div>

  <div class="q-box"><div class="hint-label">HINT</div><div class="text-sm">What operations does LRU need? O(1) lookup, O(1) move-to-front, O(1) evict-from-tail.</div></div>

  <div class="a-box"><div class="ans-label">ANSWER <button class="reveal-btn" onclick="this.parentElement.nextElementSibling.classList.toggle('hidden');this.textContent=this.textContent==='Reveal'?'Hide':'Reveal'">Reveal</button></div><div class="hidden"><div class="text-sm" style="margin-top:6px"><b>HashMap&lt;Key, DLLNode&gt;</b> for O(1) key→node lookup.<br><b>Doubly Linked List</b> ordered by recency: head = most recent, tail = least recent.<br><br><b>get(key):</b> HashMap lookup O(1) → detach node O(1) → move to head O(1).<br><b>put(key,val):</b> If exists, update + move to head. If new: insert at head. If over capacity: remove tail node O(1) + delete from HashMap O(1).<br><br><b>Why not SLL?</b> Detaching a node requires updating prev.next, but SLL has no prev → O(n) to find it. <b>Why not Array?</b> Move-to-front shifts everything → O(n).<br><br><div style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:10px 12px;margin-top:10px"><div style="font-size:11px;font-weight:700;letter-spacing:.5px;color:#cbd5e1;margin-bottom:6px">VISUAL (animated)</div><svg viewBox="0 0 520 110" width="100%" height="110" xmlns="http://www.w3.org/2000/svg"><defs><style><![CDATA[text{font-family:system-ui,sans-serif}]]></style></defs><rect x="30" y="22" width="120" height="28" rx="8" fill="rgba(59,130,246,.18)" stroke="rgba(59,130,246,.55)"/><text x="90" y="41" font-size="11" fill="#cbd5e1" text-anchor="middle">HashMap</text><rect x="190" y="14" width="300" height="86" rx="12" fill="rgba(239,68,68,.10)" stroke="rgba(239,68,68,.5)"/><text x="340" y="34" font-size="11" fill="#cbd5e1" text-anchor="middle">Doubly Linked List (MRU → LRU)</text><g fill="none" stroke="rgba(148,163,184,.45)" stroke-width="2"><path d="M150 36 H190"/></g><g><rect x="214" y="54" width="54" height="26" rx="8" fill="rgba(255,255,255,.06)" stroke="rgba(148,163,184,.35)"/><rect x="284" y="54" width="54" height="26" rx="8" fill="rgba(255,255,255,.06)" stroke="rgba(148,163,184,.35)"/><rect x="354" y="54" width="54" height="26" rx="8" fill="rgba(255,255,255,.06)" stroke="rgba(148,163,184,.35)"/><rect x="424" y="54" width="54" height="26" rx="8" fill="rgba(255,255,255,.06)" stroke="rgba(148,163,184,.35)"/></g><g font-size="10" fill="#cbd5e1"><text x="241" y="71" text-anchor="middle">A</text><text x="311" y="71" text-anchor="middle">B</text><text x="381" y="71" text-anchor="middle">C</text><text x="451" y="71" text-anchor="middle">D</text></g><g fill="none" stroke="#93c5fd" stroke-width="3" stroke-linecap="round"><path d="M276 67 H284"/><path d="M346 67 H354"/><path d="M416 67 H424"/></g><circle r="6" fill="#22c55e"><animateMotion dur="2.6s" repeatCount="indefinite" path="M214 67 H424"/><animate attributeName="opacity" dur="2.6s" repeatCount="indefinite" values="1;1;1;0;1"/></circle><text x="206" y="95" font-size="10" fill="#94a3b8">MRU</text><text x="468" y="95" font-size="10" fill="#94a3b8">LRU</text></svg></div><br><b>Used in:</b><br>• Browsers (history/cache)<br>• OS memory management<br>• Databases (buffer cache)<br>• APIs &amp; backend caching<br><br>LeetCode #146.</div></div></div>

</div>`},



// Q9

{dark:true,html:`

<div class="pad">

  <div style="display:flex;justify-content:space-between;align-items:center">${'<span class="badge" style="background:#ef4444">DOUBLY LL</span>'}<span class="tag" style="background:#f59e0b22;color:#f59e0b">HARD</span></div>

  <div class="q-title" style="margin-top:8px">Q9: Design a browser's back/forward navigation. Which data structure and why?</div>

  <div class="q-box"><div class="hint-label">HINT</div><div class="text-sm">You need to go backward and forward. When you navigate to a new URL from middle, forward history is cleared.</div></div>

  <div class="a-box"><div class="ans-label">ANSWER <button class="reveal-btn" onclick="this.parentElement.nextElementSibling.classList.toggle('hidden');this.textContent=this.textContent==='Reveal'?'Hide':'Reveal'">Reveal</button></div><div class="hidden"><div class="text-sm" style="margin-top:6px"><b>Doubly Linked List</b> with a cursor pointer:<br>• Back = cursor = cursor.prev O(1)<br>• Forward = cursor = cursor.next O(1)<br>• New URL = insert after cursor, truncate everything after O(1)<br><br><b>Alternative: Two Stacks</b> — backStack and forwardStack. Back: pop from back, push to forward. Forward: pop from forward, push to back. New URL: push to back, clear forward stack. Both are O(1).<br><br>DLL is more natural (the history IS a list). Two stacks are simpler to implement.</div></div></div>

</div>`},



// Q10

{dark:true,html:`

<div class="pad">

  <div style="display:flex;justify-content:space-between;align-items:center">${'<span class="badge" style="background:#8b5cf6">CIRCULAR LL</span>'}<span class="tag" style="background:#ef444422;color:#ef4444">SENIOR</span></div>

  <div class="q-title" style="margin-top:8px">Q10: Josephus Problem — N people in a circle, every Kth person eliminated. Optimal solution?</div>

  <div class="q-box"><div class="hint-label">HINT</div><div class="text-sm">CLL simulation is O(NK). Can you do better with math?</div></div>

  <div class="a-box"><div class="ans-label">ANSWER <button class="reveal-btn" onclick="this.parentElement.nextElementSibling.classList.toggle('hidden');this.textContent=this.textContent==='Reveal'?'Hide':'Reveal'">Reveal</button></div><div class="hidden"><div class="text-sm" style="margin-top:6px"><b>CLL approach:</b> Build circular list. Count K, remove node, repeat. O(NK) time.<br><br><b>Mathematical O(N):</b><br><code>J(1, K) = 0<br>J(N, K) = (J(N-1, K) + K) % N</code><br><br>The recurrence works because after removing the Kth person, the problem shifts to N-1 people with a rotated starting position. The +K accounts for the rotation, %N handles the wrap-around.<br><br>For K=2: J(N) = 2L + 1 where N = 2^m + L (bit manipulation trick).</div></div></div>

</div>`},



// Q11

{dark:true,html:`

<div class="pad">

  <div style="display:flex;justify-content:space-between;align-items:center">${'<span class="badge" style="background:#8b5cf6">CIRCULAR LL</span>'}<span class="tag" style="background:#f59e0b22;color:#f59e0b">HARD</span></div>

  <div class="q-title" style="margin-top:8px">Q11: Design a multiplayer game where turns cycle. Players can join/leave mid-game. Singly or Doubly Circular?</div>

  <div class="q-box"><div class="hint-label">HINT</div><div class="text-sm">What happens when you need to remove a player and you only have a forward pointer?</div></div>

  <div class="a-box"><div class="ans-label">ANSWER <button class="reveal-btn" onclick="this.parentElement.nextElementSibling.classList.toggle('hidden');this.textContent=this.textContent==='Reveal'?'Hide':'Reveal'">Reveal</button></div><div class="hidden"><div class="text-sm" style="margin-top:6px"><b>Doubly Circular</b> for mid-game join/leave.<br><br><b>Turn cycling:</b> current = current.next → both work fine.<br><br><b>Player leaves:</b> Need to rewire prev and next. With Singly Circular, finding prev costs O(n). With Doubly Circular: player.prev.next = player.next, player.next.prev = player.prev → O(1).<br><br><b>Player joins</b> (after current player): newPlayer.next = current.next, newPlayer.prev = current, current.next.prev = newPlayer, current.next = newPlayer → O(1).<br><br>The prev pointer is the deciding factor.</div></div></div>

</div>`},



// Q12

{dark:true,html:`

<div class="pad">

  <div style="display:flex;justify-content:space-between;align-items:center">${'<span class="badge" style="background:#8b5cf6">DESIGN</span>'}<span class="tag" style="background:#ef444422;color:#ef4444">SENIOR</span></div>

  <div class="q-title" style="margin-top:8px">Q12: Design a text editor buffer. Support: insert/delete at cursor, move left/right, undo. Which structure(s)?</div>

  <div class="q-box"><div class="hint-label">HINT</div><div class="text-sm">What operation happens most? Typing = insert at cursor. What gives O(1) for that?</div></div>

  <div class="a-box"><div class="ans-label">ANSWER <button class="reveal-btn" onclick="this.parentElement.nextElementSibling.classList.toggle('hidden');this.textContent=this.textContent==='Reveal'?'Hide':'Reveal'">Reveal</button></div><div class="hidden"><div class="text-sm" style="margin-top:6px"><b>Doubly Linked List</b> for character buffer:<br>• Insert at cursor: O(1) — splice in new node<br>• Delete at cursor: O(1) — remove node, rewire<br>• Move cursor L/R: O(1) — prev/next<br><br>Array is bad: insert/delete = O(n) shifting.<br><br><b>Undo:</b> Stack of operations. Each operation stores {type, position, char}. Undo = pop and reverse.<br><br><b>Alternative: Gap Buffer</b> — two arrays with a gap at cursor position. Used by Emacs. O(1) insert at cursor, O(n) cursor jump. <b>Rope</b> for large files — balanced BST of string chunks.</div></div></div>

</div>`},



// Q13

{dark:true,html:`

<div class="pad">

  <div style="display:flex;justify-content:space-between;align-items:center">${'<span class="badge" style="background:#8b5cf6">DESIGN</span>'}<span class="tag" style="background:#ef444422;color:#ef4444">SENIOR</span></div>

  <div class="q-title" style="margin-top:8px">Q13: You need O(1) access by key, O(1) insert at both ends, O(1) delete by reference. Single structure possible?</div>

  <div class="q-box"><div class="hint-label">HINT</div><div class="text-sm">No single structure satisfies all three. What combination would?</div></div>

  <div class="a-box"><div class="ans-label">ANSWER <button class="reveal-btn" onclick="this.parentElement.nextElementSibling.classList.toggle('hidden');this.textContent=this.textContent==='Reveal'?'Hide':'Reveal'">Reveal</button></div><div class="hidden"><div class="text-sm" style="margin-top:6px"><b>Doubly Linked List + HashMap.</b><br><br>• HashMap: O(1) key → node lookup<br>• DLL: O(1) insert at head/tail<br>• DLL: O(1) delete by node reference (detach via prev/next)<br><br>This is the <b>LRU Cache pattern</b> and it appears everywhere:<br>• Python OrderedDict (internally DLL+HashMap)<br>• LFU Cache (extends with frequency buckets)<br>• Real-time leaderboards<br>• Session management with timeout eviction<br><br>No single structure gives all three: Array has O(1) access but O(n) delete. LL has O(1) delete but O(n) access.</div></div></div>

</div>`},



// Q14

{dark:true,html:`

<div class="pad">

  <div style="display:flex;justify-content:space-between;align-items:center">${'<span class="badge" style="background:#10b981">ARRAYLIST</span>'}<span class="tag" style="background:#ef444422;color:#ef4444">SENIOR</span></div>

  <div class="q-title" style="margin-top:8px">Q14: Implement remove(value) in O(1) for an unordered ArrayList. How?</div>

  <div class="q-box"><div class="hint-label">HINT</div><div class="text-sm">Normal remove is O(n) due to shifting. Can you avoid the shift entirely?</div></div>

  <div class="a-box"><div class="ans-label">ANSWER <button class="reveal-btn" onclick="this.parentElement.nextElementSibling.classList.toggle('hidden');this.textContent=this.textContent==='Reveal'?'Hide':'Reveal'">Reveal</button></div><div class="hidden"><div class="text-sm" style="margin-top:6px"><b>Swap-with-last trick + HashMap:</b><br><br>1. HashMap maps value → index for O(1) lookup<br>2. To remove value at index i:<br>&nbsp;&nbsp;• Swap arr[i] with arr[size-1]<br>&nbsp;&nbsp;• Update HashMap for swapped element<br>&nbsp;&nbsp;• Decrement size (effectively removing last)<br>&nbsp;&nbsp;• Remove old entry from HashMap<br><br>No shifting needed! <b>O(1) for all operations.</b><br><br>Trade-off: Order is not preserved. Works perfectly for sets, bags, and randomized data structures. This is how many game engines handle entity removal.</div></div></div>

</div>`},



// Q15

{dark:true,html:`

<div class="pad">

  <div style="display:flex;justify-content:space-between;align-items:center">${'<span class="badge" style="background:#f97316">SINGLY LL</span>'}<span class="tag" style="background:#ef444422;color:#ef4444">SENIOR</span></div>

  <div class="q-title" style="margin-top:8px">Q15: Merge two sorted linked lists into one sorted list. Time and space complexity?</div>

  <div class="q-box"><div class="hint-label">HINT</div><div class="text-sm">Compare heads of both lists, pick smaller, advance that pointer. Like merge step of merge sort.</div></div>

  <div class="a-box"><div class="ans-label">ANSWER <button class="reveal-btn" onclick="this.parentElement.nextElementSibling.classList.toggle('hidden');this.textContent=this.textContent==='Reveal'?'Hide':'Reveal'">Reveal</button></div><div class="hidden"><div class="text-sm" style="margin-top:6px"><code>dummy = new Node(0)<br>tail = dummy<br>while (l1 != null && l2 != null):<br>&nbsp;&nbsp;if l1.val <= l2.val:<br>&nbsp;&nbsp;&nbsp;&nbsp;tail.next = l1; l1 = l1.next<br>&nbsp;&nbsp;else:<br>&nbsp;&nbsp;&nbsp;&nbsp;tail.next = l2; l2 = l2.next<br>&nbsp;&nbsp;tail = tail.next<br>tail.next = l1 ?? l2<br>return dummy.next</code><br><br><b>Time: O(m+n)</b> — each node visited once.<br><b>Space: O(1)</b> — we reuse existing nodes (no new allocations).<br>The dummy node trick avoids special-casing the first element. LeetCode #21.</div></div></div>

</div>`},



// Q16

{dark:true,html:`

<div class="pad">

  <div style="display:flex;justify-content:space-between;align-items:center">${'<span class="badge" style="background:#f97316">LINKED LIST</span>'}<span class="tag" style="background:#ef444422;color:#ef4444">SENIOR</span></div>

  <div class="q-title" style="margin-top:8px">Q16: Merge K sorted linked lists. What's the optimal approach?</div>

  <div class="q-box"><div class="hint-label">HINT</div><div class="text-sm">Naive: merge pairs one by one. Better: use a data structure that always gives you the minimum.</div></div>

  <div class="a-box"><div class="ans-label">ANSWER <button class="reveal-btn" onclick="this.parentElement.nextElementSibling.classList.toggle('hidden');this.textContent=this.textContent==='Reveal'?'Hide':'Reveal'">Reveal</button></div><div class="hidden"><div class="text-sm" style="margin-top:6px"><b>Min-Heap approach:</b><br>1. Insert head of all K lists into a min-heap<br>2. Extract min → add to result<br>3. If extracted node has .next, push it to heap<br>4. Repeat until heap empty<br><br><b>Time: O(N log K)</b> — N total nodes, each heap op is O(log K)<br><b>Space: O(K)</b> — heap size<br><br><b>Alternative: Divide & Conquer</b><br>Merge pairs: K→K/2→K/4→...→1. Like merge sort on the list array.<br>Same O(N log K) time. Both are optimal. LeetCode #23 (Hard).</div></div></div>

</div>`},



// Q17

{dark:true,html:`

<div class="pad">

  <div style="display:flex;justify-content:space-between;align-items:center">${'<span class="badge" style="background:#ef4444">DOUBLY LL</span>'}<span class="tag" style="background:#ef444422;color:#ef4444">SENIOR</span></div>

  <div class="q-title" style="margin-top:8px">Q17: Flatten a multilevel doubly linked list where nodes can have child sublists. (LeetCode 430)</div>

  <div class="q-box"><div class="hint-label">HINT</div><div class="text-sm">When you encounter a child, you need to splice the child list into the main list. Think recursively or use a stack.</div></div>

  <div class="a-box"><div class="ans-label">ANSWER <button class="reveal-btn" onclick="this.parentElement.nextElementSibling.classList.toggle('hidden');this.textContent=this.textContent==='Reveal'?'Hide':'Reveal'">Reveal</button></div><div class="hidden"><div class="text-sm" style="margin-top:6px"><b>Iterative approach:</b><br><code>curr = head<br>while curr:<br>&nbsp;&nbsp;if curr.child:<br>&nbsp;&nbsp;&nbsp;&nbsp;childTail = findTail(curr.child)<br>&nbsp;&nbsp;&nbsp;&nbsp;childTail.next = curr.next<br>&nbsp;&nbsp;&nbsp;&nbsp;if curr.next: curr.next.prev = childTail<br>&nbsp;&nbsp;&nbsp;&nbsp;curr.next = curr.child<br>&nbsp;&nbsp;&nbsp;&nbsp;curr.child.prev = curr<br>&nbsp;&nbsp;&nbsp;&nbsp;curr.child = null<br>&nbsp;&nbsp;curr = curr.next</code><br><br><b>Key:</b> Splice child list between current and current.next. Finding child's tail is O(child length), but each node processed exactly once total → <b>O(n) overall</b>.</div></div></div>

</div>`},



// Q18

{dark:true,html:`

<div class="pad">

  <div style="display:flex;justify-content:space-between;align-items:center">${'<span class="badge" style="background:#3b82f6">ARRAY</span>'}<span class="tag" style="background:#ef444422;color:#ef4444">SENIOR</span></div>

  <div class="q-title" style="margin-top:8px">Q18: Implement a circular buffer (ring buffer) for a streaming system. 1M events/sec, fixed capacity, overwrite oldest when full.</div>

  <div class="q-box"><div class="hint-label">HINT</div><div class="text-sm">Use an array with two pointers (read/write) and modulo arithmetic.</div></div>

  <div class="a-box"><div class="ans-label">ANSWER <button class="reveal-btn" onclick="this.parentElement.nextElementSibling.classList.toggle('hidden');this.textContent=this.textContent==='Reveal'?'Hide':'Reveal'">Reveal</button></div><div class="hidden"><div class="text-sm" style="margin-top:6px"><b>Array-based ring buffer:</b><br><code>capacity = N, arr = new[N]<br>writeIdx = 0, count = 0<br><br>write(event):<br>&nbsp;&nbsp;arr[writeIdx] = event<br>&nbsp;&nbsp;writeIdx = (writeIdx + 1) % N<br>&nbsp;&nbsp;count = min(count+1, N)<br><br>readOldest():<br>&nbsp;&nbsp;readIdx = (writeIdx - count + N) % N<br>&nbsp;&nbsp;return arr[readIdx]</code><br><br><b>All operations O(1).</b> Array is ideal here: fixed size, cache-friendly for sequential reads, no allocation overhead. This is used in: OS kernel logs, network packet buffers, audio processing. NOT a linked list — CLL would add 8B overhead per event.</div></div></div>

</div>`},



// Q19

{dark:true,html:`

<div class="pad">

  <div style="display:flex;justify-content:space-between;align-items:center">${'<span class="badge" style="background:#f97316">LINKED LIST</span>'}<span class="tag" style="background:#ef444422;color:#ef4444">SENIOR</span></div>

  <div class="q-title" style="margin-top:8px">Q19: Check if a singly linked list is a palindrome in O(n) time and O(1) space.</div>

  <div class="q-box"><div class="hint-label">HINT</div><div class="text-sm">Combine three techniques: find middle, reverse second half, compare.</div></div>

  <div class="a-box"><div class="ans-label">ANSWER <button class="reveal-btn" onclick="this.parentElement.nextElementSibling.classList.toggle('hidden');this.textContent=this.textContent==='Reveal'?'Hide':'Reveal'">Reveal</button></div><div class="hidden"><div class="text-sm" style="margin-top:6px"><b>Three steps:</b><br>1. <b>Find middle</b> with slow/fast pointers → O(n)<br>2. <b>Reverse second half</b> in-place → O(n)<br>3. <b>Compare</b> first half with reversed second half → O(n)<br>4. (Optional) Reverse second half again to restore list<br><br><code>1→2→3→2→1<br>mid = 3, reverse after: 1→2→3←2←1<br>Compare: 1==1 ✓, 2==2 ✓ → palindrome</code><br><br><b>O(n) time, O(1) space.</b> Combines three fundamental LL techniques in one problem. Without O(1) space constraint, you'd just use a stack → O(n) space. LeetCode #234.</div></div></div>

</div>`},



// Q20

{dark:true,html:`

<div class="pad">

  <div style="display:flex;justify-content:space-between;align-items:center">${'<span class="badge" style="background:#8b5cf6">SYSTEM DESIGN</span>'}<span class="tag" style="background:#ef444422;color:#ef4444">SENIOR</span></div>

  <div class="q-title" style="margin-top:8px">Q20: In a real system, when would you NEVER use a LinkedList despite its O(1) insert? When is ArrayList always better?</div>

  <div class="q-box"><div class="hint-label">HINT</div><div class="text-sm">Think beyond Big-O: hardware, GC, real-world workloads.</div></div>

  <div class="a-box"><div class="ans-label">ANSWER <button class="reveal-btn" onclick="this.parentElement.nextElementSibling.classList.toggle('hidden');this.textContent=this.textContent==='Reveal'?'Hide':'Reveal'">Reveal</button></div><div class="hidden"><div class="text-sm" style="margin-top:6px"><b>LinkedList is almost always worse in practice when:</b><br><br>1. <b>Sequential access patterns</b> — cache misses kill LL performance<br>2. <b>Small-to-medium sizes (&lt;10K)</b> — ArrayList's shifting is faster than LL's pointer chasing due to cache effects<br>3. <b>GC-heavy environments</b> — each LL node is a separate object → more GC pressure<br>4. <b>Memory-constrained</b> — 24+ bytes per node (header+data+pointers) vs 4-8 for array<br><br><b>Java's own guidance:</b> ArrayList is preferred for most use cases. LinkedList wins ONLY when you have: (a) a direct reference to the node AND (b) frequent removal of that specific node. Otherwise ArrayList + ArrayDeque dominate.</div></div></div>

</div>`},

];



// Build slides

const deck=document.getElementById('deck');
const slides=[];

S.forEach((s,i)=>{

  const d=document.createElement('div');

  d.className='slide'+(s.dark===true?' dark':s.dark==='dark2'?' dark2':s.dark==='dark3'?' dark3':'');

  if(i===0)d.classList.add('active');

  d.innerHTML=s.html;

  deck.appendChild(d);
  slides.push(d);

});

function toggleFrameworkAnswer(btn){
  const card=btn.closest('.fw-step');
  if(!card) return;
  const ans=card.querySelector('.fw-ans');
  if(!ans) return;
  ans.classList.toggle('hidden');
  btn.classList.toggle('on');
}

function setupQuestionInteractivity(){
  document.querySelectorAll('.slide .q-title').forEach((qt)=>{
    const slide=qt.closest('.slide');
    if(!slide) return;

    slide.querySelectorAll('.tag').forEach(el=>el.remove());

    const badge=slide.querySelector('.badge');
    if(badge) badge.classList.remove('hidden');

    const qbox=slide.querySelector('.q-box');
    if(!qbox) return;

    const label=qbox.querySelector('.hint-label');
    const hintText=qbox.querySelector('.text-sm');
    if(hintText) hintText.classList.remove('hidden');

    if(label && !label.querySelector('button')){
      label.style.display='flex';
      label.style.alignItems='center';
      label.style.justifyContent='space-between';

      const btn=document.createElement('button');
      btn.className='hint-btn';
      btn.textContent='Hide hint';
      btn.onclick=()=>{
        if(hintText) hintText.classList.toggle('hidden');
        btn.textContent=hintText && hintText.classList.contains('hidden') ? 'Hint' : 'Hide hint';
      };
      label.appendChild(btn);
    }
  });
}

let cur=0;
function goTo(n){
  if(n===cur) return;
  slides[cur].classList.remove('active');
  cur=n;
  slides[cur].classList.add('active');
}

function go(d){goTo(Math.max(0,Math.min(S.length-1,cur+d)))}

setupQuestionInteractivity();

document.addEventListener('keydown',e=>{

  if(e.key==='ArrowRight'){e.preventDefault();go(1)}

  if(e.key==='ArrowLeft'){e.preventDefault();go(-1)}

});

</script>
